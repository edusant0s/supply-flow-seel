<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa de Fornecedores</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" defer></script>
  <style>
    :root {
      --bg: #f1f5f9;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #0a192f;
      --accent: #2563eb;
      --green: #059669;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      padding: 16px;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
      gap: 16px;
      max-width: 1920px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .toolbar {
      max-width: 1920px;
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: minmax(280px, 1.4fr) repeat(5, minmax(130px, 1fr)) auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field input,
    .field select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 11px;
      outline: none;
      font-size: 0.84rem;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .btn {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      padding: 0 12px;
      font-size: 0.8rem;
      font-weight: 800;
      text-decoration: none;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
      white-space: nowrap;
    }

    .btn:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn.primary:hover { background: #172a45; }
    .btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.good { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.ghost { border-color: transparent; background: transparent; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .summary {
      max-width: 1920px;
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 10px;
    }

    .kpi {
      padding: 13px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .kpi span {
      display: block;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .kpi b {
      display: block;
      margin-top: 2px;
      font-size: 1.45rem;
      line-height: 1.1;
      color: var(--ink);
    }

    .panelHead {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .panelTitle {
      min-width: 0;
    }

    .panelTitle b {
      display: block;
      font-size: 0.92rem;
      color: var(--ink);
    }

    .panelTitle span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .listTools {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .list {
      height: calc(100vh - 232px);
      min-height: 520px;
      overflow: auto;
      padding: 10px;
    }

    .supplierCard {
      width: 100%;
      display: grid;
      gap: 9px;
      padding: 12px;
      margin-bottom: 9px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      text-align: left;
      color: inherit;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .supplierCard:hover,
    .supplierCard.active {
      border-color: #93c5fd;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.10);
      background: #f8fbff;
    }

    .supplierTop {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .supplierName {
      font-size: 0.88rem;
      font-weight: 900;
      color: var(--blue);
      line-height: 1.25;
    }

    .supplierMeta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.73rem;
      line-height: 1.35;
    }

    .badgeRow {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.66rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge.good { background: #ecfdf5; border-color: #bbf7d0; color: #047857; }
    .badge.warn { background: #fffbeb; border-color: #fde68a; color: #b45309; }
    .badge.gray { background: #f1f5f9; border-color: #e2e8f0; color: #475569; }

    .cardActions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .cardActions .btn {
      height: 30px;
      padding: 0 9px;
      font-size: 0.68rem;
    }

    .loadMore {
      width: 100%;
      margin: 4px 0 2px;
    }

    .workspace {
      display: grid;
      grid-template-rows: minmax(330px, 45vh) minmax(280px, 1fr);
      gap: 16px;
    }

    .mapBox {
      position: relative;
      height: 100%;
      min-height: 330px;
      background: #e2e8f0;
    }

    .mapBox iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #e2e8f0;
    }

    .mapOverlay {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.12);
    }

    .mapOverlay b {
      display: block;
      font-size: 0.78rem;
      color: var(--ink);
    }

    .mapOverlay span {
      display: block;
      margin-top: 2px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .detailGrid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.95fr);
      gap: 16px;
      padding: 14px;
    }

    .detailBlock {
      min-width: 0;
    }

    .detailBlock h2 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
      color: var(--blue);
    }

    .detailBlock p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 13px;
    }

    .infoField {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
    }

    .infoField span {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .infoField b,
    .infoField a {
      display: block;
      min-width: 0;
      color: var(--ink);
      font-size: 0.78rem;
      line-height: 1.35;
      word-break: break-word;
    }

    .infoField a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 800;
    }

    .routePanel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
      overflow: hidden;
    }

    .routeHead {
      padding: 11px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .routeHead b {
      font-size: 0.82rem;
    }

    .routeList {
      max-height: 190px;
      overflow: auto;
      padding: 9px;
    }

    .routeItem {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      margin-bottom: 7px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 9px;
    }

    .routeIndex {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--blue);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 900;
    }

    .routeItem b {
      display: block;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .routeItem span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.68rem;
    }

    .routeSummary {
      padding: 0 11px 11px;
      color: var(--muted);
      font-size: 0.73rem;
      line-height: 1.45;
    }

    .empty {
      padding: 34px 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.84rem;
    }

    .hiddenInput {
      display: none;
    }

    @media (max-width: 1180px) {
      .toolbar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .summary { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .shell { grid-template-columns: 1fr; }
      .list { height: 460px; min-height: 360px; }
      .workspace { grid-template-rows: 420px auto; }
    }

    @media (max-width: 760px) {
      .app { padding: 10px; }
      .toolbar { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detailGrid { grid-template-columns: 1fr; }
      .fields { grid-template-columns: 1fr; }
      .panelHead { align-items: start; flex-direction: column; }
      .mapOverlay { align-items: start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <input id="fileInput" class="hiddenInput" type="file" accept=".xlsx,.xls,.xlsm,.csv" />

    <section class="toolbar" aria-label="Filtros de fornecedores">
      <div class="field">
        <label for="searchInput">Busca</label>
        <input id="searchInput" type="search" autocomplete="off" placeholder="Fornecedor, cidade, serviço, email..." />
      </div>
      <div class="field">
        <label for="categoryFilter">Categoria</label>
        <select id="categoryFilter"></select>
      </div>
      <div class="field">
        <label for="serviceFilter">Serviço</label>
        <input id="serviceFilter" type="search" autocomplete="off" placeholder="Ex: frete, concreto, EPI..." />
      </div>
      <div class="field">
        <label for="regionFilter">Região</label>
        <select id="regionFilter"></select>
      </div>
      <div class="field">
        <label for="ufFilter">UF</label>
        <select id="ufFilter"></select>
      </div>
      <div class="field">
        <label for="statusFilter">Cadastro</label>
        <select id="statusFilter">
          <option value="">Todos</option>
          <option value="sim">Com cadastro</option>
          <option value="nao">Sem cadastro</option>
        </select>
      </div>
      <button id="clearFiltersBtn" class="btn" type="button">Limpar</button>
    </section>

    <section id="summary" class="summary" aria-label="Indicadores"></section>

    <section class="shell">
      <aside class="panel">
        <div class="panelHead">
          <div class="panelTitle">
            <b id="listTitle">Fornecedores</b>
            <span id="listSubtitle">Carregando base...</span>
          </div>
          <div class="listTools">
            <button id="importBtn" class="btn primary" type="button">Importar</button>
            <button id="exportBtn" class="btn" type="button">CSV</button>
          </div>
        </div>
        <div id="supplierList" class="list"></div>
      </aside>

      <section class="workspace">
        <section class="panel">
          <div class="panelHead">
            <div class="panelTitle">
              <b>Mapa</b>
              <span id="mapSubtitle">Brasil</span>
            </div>
            <div class="listTools">
              <button id="openMapsBtn" class="btn accent" type="button">Google Maps</button>
              <button id="addRouteBtn" class="btn" type="button">Adicionar rota</button>
            </div>
          </div>
          <div class="mapBox">
            <iframe id="mapFrame" title="Mapa do fornecedor" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=Brasil&output=embed"></iframe>
            <div class="mapOverlay">
              <div>
                <b id="mapOverlayTitle">Nenhum fornecedor selecionado</b>
                <span id="mapOverlayText">Selecione um fornecedor na lista.</span>
              </div>
              <button id="focusSelectedBtn" class="btn" type="button">Centralizar</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div id="detailPanel" class="detailGrid"></div>
        </section>
      </section>
    </section>
  </main>

  <script src="fornecedores-data.js"></script>
  <script>
    (() => {
      const ROW_LIMIT_STEP = 80;
      const state = {
        suppliers: [],
        filtered: [],
        visibleLimit: ROW_LIMIT_STEP,
        selectedId: null,
        routeIds: [],
        filters: { q: '', category: '', service: '', region: '', uf: '', status: '' }
      };

      const elements = {
        searchInput: document.getElementById('searchInput'),
        categoryFilter: document.getElementById('categoryFilter'),
        serviceFilter: document.getElementById('serviceFilter'),
        regionFilter: document.getElementById('regionFilter'),
        ufFilter: document.getElementById('ufFilter'),
        statusFilter: document.getElementById('statusFilter'),
        clearFiltersBtn: document.getElementById('clearFiltersBtn'),
        summary: document.getElementById('summary'),
        supplierList: document.getElementById('supplierList'),
        listTitle: document.getElementById('listTitle'),
        listSubtitle: document.getElementById('listSubtitle'),
        mapFrame: document.getElementById('mapFrame'),
        mapSubtitle: document.getElementById('mapSubtitle'),
        mapOverlayTitle: document.getElementById('mapOverlayTitle'),
        mapOverlayText: document.getElementById('mapOverlayText'),
        openMapsBtn: document.getElementById('openMapsBtn'),
        addRouteBtn: document.getElementById('addRouteBtn'),
        focusSelectedBtn: document.getElementById('focusSelectedBtn'),
        detailPanel: document.getElementById('detailPanel'),
        fileInput: document.getElementById('fileInput'),
        importBtn: document.getElementById('importBtn'),
        exportBtn: document.getElementById('exportBtn')
      };

      const text = value => value === null || value === undefined ? '' : String(value).trim();
      const normalize = value => text(value).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      const headerKey = value => normalize(value).replace(/[^a-z0-9]/g, '');
      const escapeHtml = value => text(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');

      function pick(row, names) {
        const wanted = names.map(headerKey);
        const found = Object.entries(row).find(([key]) => wanted.includes(headerKey(key)));
        return found ? found[1] : '';
      }

      function parseCoordinate(value) {
        const raw = text(value).replace(',', '.').match(/-?\d+(\.\d+)?/);
        return raw ? Number(raw[0]) : null;
      }

      function normalizeSupplier(row, index) {
        const name = text(pick(row, ['Nome do Fornecedor', 'Nome', 'Fornecedor', 'Razão Social'])) || 'Fornecedor sem nome';
        const city = text(pick(row, ['Cidade', 'Municipio', 'Município']));
        const uf = text(pick(row, ['UF', 'Estado'])).toUpperCase();
        const region = text(pick(row, ['Região', 'Regiao']));
        const category = text(pick(row, ['Categoria'])) || 'Sem categoria';
        const service = text(pick(row, ['Produto/Serviço', 'Tipo de Serviço', 'Serviço', 'Produto', 'Usina', 'Tubos e Conexões']));
        const code = text(pick(row, ['Código', 'Codigo', 'Cod']));
        const phone = text(pick(row, ['Telefone', 'Contato', 'Celular']));
        const email = text(pick(row, ['Email', 'E-mail']));
        const site = text(pick(row, ['Site', 'Website']));
        const cnpj = text(pick(row, ['CNPJ']));
        const observations = text(pick(row, ['Observações', 'Observacoes', 'Observação', 'Observacao']));
        const activeRaw = normalize(pick(row, ['Tem Cadastro Ativo?', 'Cadastro']));
        const active = activeRaw.includes('sim') || activeRaw === 'ativo' || activeRaw === 's';
        const lat = parseCoordinate(pick(row, ['Latitude', 'Lat']));
        const lng = parseCoordinate(pick(row, ['Longitude', 'Lng', 'Long']));
        const id = `${code || 'forn'}-${index}`.replace(/[^a-zA-Z0-9_-]/g, '-');
        const location = [city, uf].filter(Boolean).join(' / ') || 'Sem localização';
        const query = [name, city, uf, 'Brasil'].filter(Boolean).join(', ');
        const fields = [name, city, uf, region, category, service, code, phone, email, site, cnpj, observations].join(' ');

        return {
          id, raw: row, index, name, city, uf, region, category, service, code,
          phone, email, site, cnpj, observations, active, lat, lng, location, query,
          hasContact: Boolean(phone || email || site),
          search: normalize(fields)
        };
      }

      function mapsEmbedUrl(supplier) {
        return `https://www.google.com/maps?q=${encodeURIComponent(supplier ? supplier.query : 'Brasil')}&output=embed`;
      }

      function mapsSearchUrl(supplier) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(supplier ? supplier.query : 'Brasil')}`;
      }

      function routeUrl() {
        const points = state.routeIds.map(id => state.suppliers.find(item => item.id === id)).filter(Boolean);
        if (!points.length) return mapsSearchUrl(getSelectedSupplier());
        if (points.length === 1) return mapsSearchUrl(points[0]);
        const origin = points[0].query;
        const destination = points[points.length - 1].query;
        const waypoints = points.slice(1, -1).map(item => item.query).join('|');
        const params = new URLSearchParams({ api: '1', travelmode: 'driving', origin, destination });
        if (waypoints) params.set('waypoints', waypoints);
        return `https://www.google.com/maps/dir/?${params.toString()}`;
      }

      function uniqueValues(key) {
        return [...new Set(state.suppliers.map(item => item[key]).filter(Boolean))]
          .sort((a, b) => a.localeCompare(b, 'pt-BR'));
      }

      function fillSelect(select, values, label) {
        select.innerHTML = `<option value="">${escapeHtml(label)}</option>` +
          values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join('');
      }

      function setupFilters() {
        fillSelect(elements.categoryFilter, uniqueValues('category'), 'Todas');
        fillSelect(elements.regionFilter, uniqueValues('region'), 'Todas');
        fillSelect(elements.ufFilter, uniqueValues('uf'), 'Todas');
      }

      function applyFilters() {
        const terms = normalize(state.filters.q).split(/\s+/).filter(Boolean);
        let result = state.suppliers.filter(item => {
          if (state.filters.category && item.category !== state.filters.category) return false;
          if (state.filters.service && !normalize(item.service).includes(normalize(state.filters.service))) return false;
          if (state.filters.region && item.region !== state.filters.region) return false;
          if (state.filters.uf && item.uf !== state.filters.uf) return false;
          if (state.filters.status === 'sim' && !item.active) return false;
          if (state.filters.status === 'nao' && item.active) return false;
          if (terms.length && !terms.every(term => item.search.includes(term))) return false;
          return true;
        });

        result = result.sort((a, b) => {
          if (a.active !== b.active) return a.active ? -1 : 1;
          return a.name.localeCompare(b.name, 'pt-BR', { numeric: true });
        });

        state.filtered = result;
        if (!result.some(item => item.id === state.selectedId)) {
          state.selectedId = result[0]?.id || null;
        }
      }

      function getSelectedSupplier() {
        return state.suppliers.find(item => item.id === state.selectedId) || null;
      }

      function renderSummary() {
        const filtered = state.filtered;
        const active = filtered.filter(item => item.active).length;
        const contacts = filtered.filter(item => item.hasContact).length;
        const ufs = new Set(filtered.map(item => item.uf).filter(Boolean)).size;
        const cities = new Set(filtered.map(item => `${item.city}-${item.uf}`).filter(value => value !== '-')).size;
        const withCoords = filtered.filter(item => item.lat !== null && item.lng !== null).length;
        const cards = [
          ['Fornecedores', filtered.length],
          ['Com cadastro', active],
          ['Com contato', contacts],
          ['UFs', ufs],
          ['Cidades', cities],
          ['Com coordenadas', withCoords]
        ];
        elements.summary.innerHTML = cards.map(([label, value]) => `
          <div class="kpi"><span>${escapeHtml(label)}</span><b>${Number(value).toLocaleString('pt-BR')}</b></div>
        `).join('');
      }

      function supplierCard(item) {
        const selected = item.id === state.selectedId ? ' active' : '';
        const inRoute = state.routeIds.includes(item.id);
        return `
          <article class="supplierCard${selected}" data-card-id="${escapeHtml(item.id)}">
            <div class="supplierTop">
              <div>
                <div class="supplierName">${escapeHtml(item.name)}</div>
                <div class="supplierMeta">${escapeHtml(item.location)}${item.code ? ` · ${escapeHtml(item.code)}` : ''}</div>
              </div>
              <span class="badge ${item.active ? 'good' : 'warn'}">${item.active ? 'Ativo' : 'Sem cadastro'}</span>
            </div>
            <div class="badgeRow">
              <span class="badge gray">${escapeHtml(item.category)}</span>
              ${item.service ? `<span class="badge">${escapeHtml(item.service)}</span>` : ''}
              ${item.region ? `<span class="badge gray">${escapeHtml(item.region)}</span>` : ''}
            </div>
            <div class="cardActions">
              <button type="button" class="btn primary" data-select="${escapeHtml(item.id)}">Ver mapa</button>
              <button type="button" class="btn" data-route="${escapeHtml(item.id)}">${inRoute ? 'Remover rota' : 'Adicionar rota'}</button>
              ${item.email ? `<a class="btn" href="mailto:${encodeURIComponent(item.email)}">Email</a>` : ''}
              ${item.site ? `<a class="btn" href="${escapeHtml(normalizeSite(item.site))}" target="_blank" rel="noopener noreferrer">Site</a>` : ''}
            </div>
          </article>
        `;
      }

      function renderList() {
        const visible = state.filtered.slice(0, state.visibleLimit);
        elements.listTitle.textContent = `${state.filtered.length.toLocaleString('pt-BR')} fornecedor(es)`;
        elements.listSubtitle.textContent = `Mostrando ${visible.length.toLocaleString('pt-BR')} de ${state.filtered.length.toLocaleString('pt-BR')}`;
        if (!visible.length) {
          elements.supplierList.innerHTML = '<div class="empty">Nenhum fornecedor encontrado.</div>';
          return;
        }

        elements.supplierList.innerHTML = visible.map(supplierCard).join('') +
          (state.visibleLimit < state.filtered.length
            ? '<button id="loadMoreBtn" class="btn loadMore" type="button">Carregar mais</button>'
            : '');
      }

      function normalizeSite(site) {
        const value = text(site);
        if (!value) return '';
        return /^https?:\/\//i.test(value) ? value : `https://${value}`;
      }

      function renderMap() {
        const selected = getSelectedSupplier();
        elements.openMapsBtn.disabled = !selected;
        elements.addRouteBtn.disabled = !selected;
        elements.focusSelectedBtn.disabled = !selected;
        elements.mapFrame.src = mapsEmbedUrl(selected);
        elements.mapSubtitle.textContent = selected ? selected.location : 'Brasil';
        elements.mapOverlayTitle.textContent = selected ? selected.name : 'Nenhum fornecedor selecionado';
        elements.mapOverlayText.textContent = selected ? `${selected.location}${selected.service ? ` · ${selected.service}` : ''}` : 'Selecione um fornecedor na lista.';
      }

      function detailField(label, value, link) {
        if (!value) return '';
        const content = link
          ? `<a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(value)}</a>`
          : `<b>${escapeHtml(value)}</b>`;
        return `<div class="infoField"><span>${escapeHtml(label)}</span>${content}</div>`;
      }

      function renderDetail() {
        const selected = getSelectedSupplier();
        if (!selected) {
          elements.detailPanel.innerHTML = '<div class="empty">Selecione um fornecedor para ver os detalhes.</div>';
          return;
        }

        elements.detailPanel.innerHTML = `
          <div class="detailBlock">
            <div class="badgeRow">
              <span class="badge ${selected.active ? 'good' : 'warn'}">${selected.active ? 'Cadastro ativo' : 'Sem cadastro ativo'}</span>
              <span class="badge gray">${escapeHtml(selected.category)}</span>
            </div>
            <h2>${escapeHtml(selected.name)}</h2>
            <p>${escapeHtml(selected.location)}${selected.region ? ` · ${escapeHtml(selected.region)}` : ''}</p>
            <div class="fields">
              ${detailField('Código', selected.code)}
              ${detailField('Serviço', selected.service)}
              ${detailField('Telefone', selected.phone)}
              ${detailField('Email', selected.email, selected.email ? `mailto:${encodeURIComponent(selected.email)}` : '')}
              ${detailField('Site', selected.site, selected.site ? normalizeSite(selected.site) : '')}
              ${detailField('CNPJ', selected.cnpj)}
              ${detailField('Coordenadas', selected.lat !== null && selected.lng !== null ? `${selected.lat}, ${selected.lng}` : '')}
              ${detailField('Observações', selected.observations)}
            </div>
          </div>
          <div class="routePanel">
            <div class="routeHead">
              <b>Rota selecionada</b>
              <div class="listTools">
                <button type="button" class="btn" id="clearRouteBtn">Limpar</button>
                <button type="button" class="btn accent" id="openRouteBtn">Abrir rota</button>
              </div>
            </div>
            <div id="routeList" class="routeList"></div>
            <div id="routeSummary" class="routeSummary"></div>
          </div>
        `;

        document.getElementById('clearRouteBtn').addEventListener('click', () => {
          state.routeIds = [];
          renderAll();
        });
        document.getElementById('openRouteBtn').addEventListener('click', () => window.open(routeUrl(), '_blank', 'noopener'));
        renderRoute();
      }

      function renderRoute() {
        const routeList = document.getElementById('routeList');
        const routeSummary = document.getElementById('routeSummary');
        if (!routeList || !routeSummary) return;
        const points = state.routeIds.map(id => state.suppliers.find(item => item.id === id)).filter(Boolean);
        if (!points.length) {
          routeList.innerHTML = '<div class="empty">Nenhum ponto na rota.</div>';
          routeSummary.textContent = 'Adicione fornecedores pela lista ou pelo botão do mapa.';
          return;
        }

        routeList.innerHTML = points.map((item, index) => `
          <div class="routeItem">
            <span class="routeIndex">${index + 1}</span>
            <div><b>${escapeHtml(item.name)}</b><span>${escapeHtml(item.location)}</span></div>
            <button type="button" class="btn ghost" data-remove-route="${escapeHtml(item.id)}">Remover</button>
          </div>
        `).join('');

        routeList.querySelectorAll('[data-remove-route]').forEach(btn => {
          btn.addEventListener('click', () => {
            state.routeIds = state.routeIds.filter(id => id !== btn.dataset.removeRoute);
            renderAll();
          });
        });

        const distance = routeDistance(points);
        routeSummary.textContent = distance === null
          ? `${points.length} ponto(s). Para distância rodoviária, abra a rota no Google Maps.`
          : `${points.length} ponto(s). Distância aproximada em linha reta: ${distance.toLocaleString('pt-BR', { maximumFractionDigits: 1 })} km.`;
      }

      function routeDistance(points) {
        if (points.length < 2 || points.some(item => item.lat === null || item.lng === null)) return null;
        return points.slice(1).reduce((total, point, index) => total + haversine(points[index], point), 0);
      }

      function haversine(a, b) {
        const radius = 6371;
        const toRad = deg => deg * Math.PI / 180;
        const dLat = toRad(b.lat - a.lat);
        const dLng = toRad(b.lng - a.lng);
        const lat1 = toRad(a.lat);
        const lat2 = toRad(b.lat);
        const x = Math.sin(dLat / 2) ** 2 + Math.sin(dLng / 2) ** 2 * Math.cos(lat1) * Math.cos(lat2);
        return radius * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
      }

      function toggleRoute(id) {
        if (state.routeIds.includes(id)) {
          state.routeIds = state.routeIds.filter(item => item !== id);
        } else {
          state.routeIds = [...state.routeIds, id].slice(0, 10);
        }
      }

      function renderAll() {
        applyFilters();
        renderSummary();
        renderList();
        renderMap();
        renderDetail();
      }

      function handleFilterChange() {
        state.filters = {
          q: elements.searchInput.value,
          category: elements.categoryFilter.value,
          service: elements.serviceFilter.value,
          region: elements.regionFilter.value,
          uf: elements.ufFilter.value,
          status: elements.statusFilter.value
        };
        state.visibleLimit = ROW_LIMIT_STEP;
        renderAll();
      }

      function debounce(fn, wait) {
        let to;
        return (...args) => {
          clearTimeout(to);
          to = setTimeout(() => fn(...args), wait);
        };
      }

      function exportVisibleCsv() {
        const rows = state.filtered.map(item => ({
          Codigo: item.code,
          Nome: item.name,
          Categoria: item.category,
          Servico: item.service,
          Cidade: item.city,
          UF: item.uf,
          Regiao: item.region,
          Telefone: item.phone,
          Email: item.email,
          Site: item.site,
          CadastroAtivo: item.active ? 'Sim' : 'Nao'
        }));
        const headers = Object.keys(rows[0] || { Codigo: '', Nome: '' });
        const csv = [headers.join(';'), ...rows.map(row => headers.map(key => csvCell(row[key])).join(';'))].join('\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fornecedores-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function csvCell(value) {
        return `"${text(value).replaceAll('"', '""')}"`;
      }

      async function importSpreadsheet(file) {
        if (!file) return;
        if (typeof XLSX === 'undefined') {
          alert('Biblioteca de importação não carregada.');
          return;
        }
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array', cellDates: true });
        const rows = [];
        workbook.SheetNames.forEach(sheetName => {
          const sheetRows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: '' });
          sheetRows.forEach(row => rows.push({ Categoria: row.Categoria || sheetName, ...row }));
        });
        if (!rows.length) return;
        state.suppliers = rows
          .filter(row => Object.values(row).some(value => text(value)))
          .map(normalizeSupplier);
        state.routeIds = [];
        state.selectedId = null;
        setupFilters();
        renderAll();
      }

      function bindEvents() {
        const debouncedSearch = debounce(handleFilterChange, 180);
        elements.searchInput.addEventListener('input', debouncedSearch);
        elements.serviceFilter.addEventListener('input', debouncedSearch);
        [elements.categoryFilter, elements.regionFilter, elements.ufFilter, elements.statusFilter]
          .forEach(select => select.addEventListener('change', handleFilterChange));

        elements.clearFiltersBtn.addEventListener('click', () => {
          elements.searchInput.value = '';
          elements.categoryFilter.value = '';
          elements.serviceFilter.value = '';
          elements.regionFilter.value = '';
          elements.ufFilter.value = '';
          elements.statusFilter.value = '';
          handleFilterChange();
        });

        elements.supplierList.addEventListener('click', event => {
          const selectBtn = event.target.closest('[data-select]');
          const routeBtn = event.target.closest('[data-route]');
          const loadMoreBtn = event.target.closest('#loadMoreBtn');
          const card = event.target.closest('[data-card-id]');

          if (loadMoreBtn) {
            state.visibleLimit += ROW_LIMIT_STEP;
            renderList();
            return;
          }
          if (routeBtn) {
            toggleRoute(routeBtn.dataset.route);
            renderAll();
            return;
          }
          if (selectBtn || card) {
            state.selectedId = (selectBtn && selectBtn.dataset.select) || card.dataset.cardId;
            renderAll();
          }
        });

        elements.openMapsBtn.addEventListener('click', () => window.open(mapsSearchUrl(getSelectedSupplier()), '_blank', 'noopener'));
        elements.focusSelectedBtn.addEventListener('click', () => renderMap());
        elements.addRouteBtn.addEventListener('click', () => {
          const selected = getSelectedSupplier();
          if (!selected) return;
          toggleRoute(selected.id);
          renderAll();
        });
        elements.importBtn.addEventListener('click', () => elements.fileInput.click());
        elements.fileInput.addEventListener('change', event => importSpreadsheet(event.target.files[0]).finally(() => { elements.fileInput.value = ''; }));
        elements.exportBtn.addEventListener('click', exportVisibleCsv);
      }

      function init() {
        state.suppliers = (window.SUPPLY_FLOW_SUPPLIERS || []).map(normalizeSupplier);
        setupFilters();
        bindEvents();
        renderAll();
      }

      init();
    })();
  </script>
</body>
</html>
