name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run security:scan

      - name: Configure Supabase public env
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Configure os secrets VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY no GitHub."
            exit 1
          fi

          {
            echo "VITE_SUPABASE_URL=$SUPABASE_URL"
            echo "VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
          } > app/.env.production

      - name: Build
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Prepare SPA files
        run: |
          cp app/dist/index.html app/dist/404.html
          touch app/dist/.nojekyll

      - name: Publish gh-pages branch
        working-directory: app/dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
